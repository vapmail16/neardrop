# Canonical path: project_scaffolding/.github/workflows/ci.yml
# (Repository root .github is a symlink for GitHub Actions discovery.)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: neardrop
          POSTGRES_PASSWORD: neardrop
          POSTGRES_DB: neardrop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U neardrop -d neardrop"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://neardrop:neardrop@localhost:5432/neardrop
      JWT_SECRET: '0123456789abcdef0123456789abcdef'
      NODE_ENV: development

    defaults:
      run:
        working-directory: project_scaffolding

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: project_scaffolding/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Migrate up
        run: npm run migrate

      - name: Migrate rollback
        run: npm run migrate:rollback

      - name: Migrate up (verify repeatability)
        run: npm run migrate

      - name: DB schema integration tests (TDD)
        run: npm run test:integration
        env:
          RUN_DB_INTEGRATION: '1'

      - name: Build
        run: npm run build

      - name: Phase 8 — Vitest count gate (200+ tests)
        run: npm run test:phase8-count-gate

      - name: Install Playwright (Chromium)
        working-directory: project_scaffolding/apps/web
        run: npx playwright install chromium --with-deps

      - name: E2E (Playwright)
        run: npm run test:e2e:web
        env:
          DISABLE_LOGIN_RATE_LIMIT: '1'
