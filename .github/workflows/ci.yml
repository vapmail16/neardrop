# Canonical path: .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: neardrop
          POSTGRES_PASSWORD: neardrop
          POSTGRES_DB: neardrop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U neardrop -d neardrop"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://neardrop:neardrop@localhost:5432/neardrop
      JWT_SECRET: '0123456789abcdef0123456789abcdef'
      NODE_ENV: development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: npm ci

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Lint
        run: |
          cd backend && npm run lint
          cd ../frontend && npm run lint

      - name: Typecheck
        run: |
          cd backend && npm run typecheck
          cd ../frontend && npm run typecheck

      - name: Test
        run: |
          cd backend && npm run test
          cd ../frontend && npm run test

      - name: Migrate up
        working-directory: backend
        run: npm run migrate

      - name: Migrate rollback
        working-directory: backend
        run: npm run migrate:rollback

      - name: Migrate up (verify repeatability)
        working-directory: backend
        run: npm run migrate

      - name: DB schema integration tests (TDD)
        working-directory: backend
        run: npm run test:integration
        env:
          RUN_DB_INTEGRATION: '1'

      - name: Build
        run: |
          cd backend && npm run build
          cd ../frontend && npm run build
